apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - mytodo-be-namespace.yaml

patches:
  - path: patch-configmap.yaml
  - path: patch-deployment.yaml

namePrefix: dev-
namespace: dev-mytodo

labels:
- pairs:
    environment: dev
  includeSelectors: true
  includeTemplates: true