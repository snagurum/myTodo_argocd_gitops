apiVersion: v1
kind: ConfigMap
metadata:
  name: "mytodo-config"
data:
  SECRET_KEY: mytodo_secret_key_change_in_production
  DATABASE_URL: mysql+pymysql://mytodo_user:mytodo_password@mysql.db.svc.cluster.local:3306/mytodo_db
  REDIS_URL: redis://redis.redis.svc.cluster.local:6379
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  CORS_ALLOWED_ORIGINS: "https://snagurum.in,https://www.snagurum.in"

